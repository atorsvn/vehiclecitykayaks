        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        .bg-primary { background-color: var(--primary); }

        .bg-secondary { background-color: var(--secondary); }

        html {
            scroll-behavior: smooth;
        }
    </style>
